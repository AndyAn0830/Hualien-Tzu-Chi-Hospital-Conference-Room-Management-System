function qrUrl(roomId) {

function getTimeStatus(timeStr) {
  try {
    // 支援「09:30 - 17:30」和「09:30-17:30」兩種格式
    const normalized = timeStr.replace(/\s*-\s*/, " - ");
    const [start, end] = normalized.split(" - ");
    const nm = new Date().getHours() * 60 + new Date().getMinutes();
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    if (nm >= sh*60+sm && nm < eh*60+em) return "using";
    if (nm >= eh*60+em) return "done";
    return "upcoming";
  } catch { return "upcoming"; }
}

// Excel 數字時間 → "HH:MM"
function excelNumToTime(val) {
  if (val === null || val === undefined || val === "") return "";
  if (typeof val === "string") {
    // 已是 HH:MM 或 HH:MM:SS 格式
    const m = val.trim().match(/^(\d{1,2}):(\d{2})/);
    if (m) return `${String(m[1]).padStart(2,"0")}:${m[2]}`;
    return val.trim();
  }
  if (typeof val === "number") {
    const totalMin = Math.round(val * 24 * 60);
    const h = Math.floor(totalMin / 60) % 24;
    const mn = totalMin % 60;
    return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;
  }
  return String(val);
}

// Excel 日期 → "YYYY-MM-DD"
function excelToDate(val) {
  if (!val) return null;
  if (typeof val === "string") {
    const cleaned = val.replace(/\//g, "-").trim();
    const m = cleaned.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
  }
  if (typeof val === "number") {
    try {
      const d = XLSX.SSF.parse_date_code(val);
      if (d) return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
    } catch {}
  }
  return null;
}

    const id = Date.now().toString();
    await firebase.database().ref(`cleaningRecords/${id}`).set({...record, id});
  } catch(e) { console.error("addCleaningRecord error", e); }

async function loadCleaningRecords() {

    const snap = await firebase.database().ref("cleaningRecords").orderByChild("id").limitToLast(200).get();
    if (snap.exists()) {
      const data = snap.val();
      return Object.values(data).sort((a,b) => Number(b.id) - Number(a.id));

  } catch(e) {}
  return [];
}

// ── 日期選擇器 ────────────────────────────────────────
function DatePicker({ selected, onChange, markedDates, accentColor }) {
  // 找到 selected 日期所在週的週一
  function getWeekStart(dateStr) {
    const d = new Date(dateStr);
    const day = d.getDay(); // 0=日,1=一,...,6=六
    const diff = day === 0 ? -6 : 1 - day; // 調整到週一
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0, 10);
  }

  const [weekStart, setWeekStart] = React.useState(() => getWeekStart(selected || todayStr()));

  // 產生這週的 7 天
  function getWeekDates(startStr) {
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(startStr);
      d.setDate(d.getDate() + i);
      days.push(d.toISOString().slice(0, 10));
    }
    return days;
  }

  function shiftWeek(dir) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + dir * 7);
    const newStart = d.toISOString().slice(0, 10);
    setWeekStart(newStart);
    // 自動選該週第一個有排程的日，或週一
    onChange(newStart);
  }

  const weekDates = getWeekDates(weekStart);
  const [,wm,wd] = weekStart.split("-");
  const weekEndDate = weekDates[6];
  const [,em,ed] = weekEndDate.split("-");

  return (
    <div style={{ padding:"10px 16px 2px" }}>
      {/* 週導覽列 */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <button onClick={() => shiftWeek(-1)} style={{
          background:"#f0f0f0", border:"none", borderRadius:10, padding:"6px 14px",
          cursor:"pointer", fontSize:16, color:"#555", fontFamily:"inherit"
        }}>‹</button>
        <div style={{ fontSize:13, fontWeight:600, color:"#666" }}>
          {parseInt(wm)}/{parseInt(wd)} ～ {parseInt(em)}/{parseInt(ed)}
        </div>
        <button onClick={() => shiftWeek(1)} style={{
          background:"#f0f0f0", border:"none", borderRadius:10, padding:"6px 14px",
          cursor:"pointer", fontSize:16, color:"#555", fontFamily:"inherit"
        }}>›</button>
      </div>
      {/* 7 天格子 */}
      <div style={{ display:"flex", gap:6 }}>
        {weekDates.map((d) => {
          const sel = d === selected, tod = d === todayStr();
          const [,m,day] = d.split("-");
          const dow = ["日","一","二","三","四","五","六"][new Date(d).getDay()];
          const hasMark = !!(markedDates && markedDates[d] && markedDates[d].length);
          return (
            <div key={d} onClick={() => onChange(d)} style={{
              flex:1, textAlign:"center", padding:"8px 2px", borderRadius:12,
              cursor:"pointer", userSelect:"none",
              background: sel ? accentColor : tod ? accentColor+"22" : "#fff",
              color: sel ? "#fff" : tod ? accentColor : "#666",
              border:`2px solid ${sel ? accentColor : tod ? accentColor+"55" : "#e8e8e8"}`,
              boxShadow: sel ? `0 4px 14px ${accentColor}44` : "none",
            }}>
              <div style={{ fontSize:10, opacity:0.8 }}>{parseInt(m)}/{parseInt(day)}</div>
              <div style={{ fontSize:12, fontWeight:sel?700:500 }}>週{dow}</div>
              <div style={{ width:5, height:5, borderRadius:"50%", margin:"3px auto 0",
                background: hasMark ? (sel?"#fff":accentColor) : "transparent" }}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    return () => clearInterval(t);
  }, [roomId]);

  const rows = roomData[selectedDate] || [];
  const isToday = selectedDate === today;
  const statusLabel = { using:"使用中", done:"已結束", upcoming:"即將使用" };
  const [keyData, setKeyData] = React.useState(null);

      <div style={{ padding:"16px 16px 40px" }}>
        {rows.length === 0 ? (
          <div style={{ background:"#fff", borderRadius:18, padding:"52px 20px", textAlign:"center", color:"#bbb", boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize:44, marginBottom:12 }}>📋</div>
            <div style={{ fontSize:16, fontWeight:600 }}>今日無排程</div>
            <div style={{ fontSize:12, marginTop:8, color:"#ccc" }}>{DEPT_NAME}</div>
          </div>
        ) : rows.map((row, idx) => {
          const status = isToday ? getTimeStatus(row.time) : "upcoming";
          const isUsing = status==="using", isDone = status==="done";

          if (isUsing) {
            return (
              <div key={row.id} style={{ marginBottom:16 }}>
                <style>{`@keyframes pulse_${room.id} { 0%,100%{box-shadow:0 0 0 4px ${room.color}33} 50%{box-shadow:0 0 0 10px ${room.color}11} }`}</style>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingLeft:4 }}>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:room.color, animation:`pulse_${room.id} 1.5s ease-in-out infinite` }}/>
                  <span style={{ fontSize:12, fontWeight:700, color:room.color, letterSpacing:1 }}>正在使用中</span>
                </div>
                <div style={{
                  background:`linear-gradient(135deg, ${room.color}ee, ${room.color})`,
                  borderRadius:20, padding:"22px 20px",
                  boxShadow:`0 8px 32px ${room.color}55`,
                  color:"#fff", position:"relative", overflow:"hidden"
                }}>
                  <div style={{ position:"absolute", right:-20, top:-20, width:110, height:110, borderRadius:"50%", background:"rgba(255,255,255,0.1)" }}/>
                  <div style={{ position:"absolute", right:20, bottom:-30, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,0.07)" }}/>
                  <div style={{ fontSize:22, fontWeight:800, marginBottom:10, lineHeight:1.3, position:"relative" }}>{row.content}</div>
                  <div style={{ fontSize:16, fontWeight:600, opacity:0.95, marginBottom:6, position:"relative" }}>🕐 {row.time}</div>
                  {row.unit && <div style={{ fontSize:14, opacity:0.85, position:"relative" }}>🏢 {row.unit}</div>}
                  {row.note && <div style={{ fontSize:13, opacity:0.75, marginTop:4, position:"relative" }}>📝 {row.note}</div>}
                </div>
              </div>
            );
          }

          return (
            <div key={row.id} style={{ display:"flex", gap:12, marginBottom:12 }}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:20 }}>
                <div style={{ width:12, height:12, borderRadius:"50%", flexShrink:0,
                  background: isDone?"#ddd":"#fff",
                  border:`3px solid ${isDone?"#ddd":room.color+"55"}`,
                  marginTop:16, zIndex:1 }}/>
                {idx < rows.length-1 && <div style={{ flex:1, width:2, background:"#e0e0e0", marginTop:2 }}/>}
              </div>
              <div style={{ flex:1, background:"#fff", borderRadius:16, padding:"14px 16px",
                boxShadow:"0 2px 8px rgba(0,0,0,0.05)",
                border:"2px solid transparent",
                opacity:isDone?0.5:1
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:isDone?"#aaa":"#333", marginBottom:4 }}>{row.content}</div>
                    <div style={{ fontSize:13, color:isDone?"#ccc":room.color, fontWeight:600 }}>🕐 {row.time}</div>
                    {row.unit && <div style={{ fontSize:12, color:"#aaa", marginTop:3 }}>🏢 {row.unit}</div>}
                    {row.note && <div style={{ fontSize:12, color:"#ccc", marginTop:2 }}>📝 {row.note}</div>}
                  </div>
                  {isToday && (
                    <span style={{
                      background: isDone?"#f0f0f0":room.light,
                      color: isDone?"#bbb":room.color,
                      padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700,
                      whiteSpace:"nowrap", marginLeft:8
                    }}>
                      {statusLabel[status]}
                    </span>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ textAlign:"center", padding:"0 0 24px", fontSize:11, color:"#bbb" }}>
        {DEPT_NAME} · 節能減碳無紙化
      </div>
      {showBorrow && <KeyBorrowModal room={room} onClose={()=>setShowBorrow(false)} onSuccess={()=>loadKeyData(roomId).then(setKeyData)}/>}
    </div>
  );
}

// Excel 匯入 Modal
// ══════════════════════════════════════════════════════
function ExcelImportModal({ room, selectedDate, onClose, onImport }) {
  const fileRef = React.useRef();
  const [preview, setPreview] = React.useState(null);
  const [importDate, setImportDate] = React.useState(selectedDate);
  const [error, setError] = React.useState("");
  const [mode, setMode] = React.useState("replace");

  // Excel 欄位說明
  const EXPECTED_COLS = [
    { label:"序號",       keys:["序號"] },
    { label:"借用日",     keys:["借用日","日期","使用日期"] },
    { label:"開始時",     keys:["開始時","開始時間","start"] },
    { label:"結束時",     keys:["結束時","結束時間","end"] },
    { label:"主辦單位",   keys:["主辦單位","使用單位","單位"] },
    { label:"活動內容說明", keys:["活動內容說明","活動內容","內容","活動"] },
  ];

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setError(""); setPreview(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type:"binary", cellDates:false });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

        // 找標題列（前 6 列中找包含關鍵字的那列）
        let headerIdx = 0;
        for (let i = 0; i < Math.min(6, raw.length); i++) {
          const s = raw[i].join("").replace(/\s/g,"");
          if (s.includes("借用日") || s.includes("開始時") || s.includes("序號") || s.includes("活動內容")) {
            headerIdx = i;
            break;
          }
        }

        const headers = raw[headerIdx].map(h => String(h).replace(/\s/g,"").trim());

        // 依關鍵字清單找欄位 index
        function findCol(keys) {
          for (const key of keys) {
            const i = headers.findIndex(h => h.includes(key));
            if (i !== -1) return i;
          }
          return -1;
        }

        const colDate    = findCol(["借用日","日期","使用日期"]);
        const colStart   = findCol(["開始時","開始時間","start"]);
        const colEnd     = findCol(["結束時","結束時間","end"]);
        const colUnit    = findCol(["主辦單位","使用單位","單位"]);
        const colContent = findCol(["活動內容說明","活動內容","內容","活動"]);
        const colNote    = findCol(["備註"]);

        // 必要欄位檢查
        const missing = [];
        if (colStart === -1)   missing.push("開始時");
        if (colEnd === -1)     missing.push("結束時");
        if (colContent === -1) missing.push("活動內容說明");
        if (missing.length > 0) {
          setError(`找不到欄位：「${missing.join("」、「")}」，請確認 Excel 標題列格式正確。`);
          return;
        }

        // 從第一筆資料偵測日期
        let detectedDate = null;
        if (colDate !== -1) {
          for (let i = headerIdx+1; i < raw.length; i++) {
            const d = excelToDate(raw[i][colDate]);
            if (d) { detectedDate = d; break; }
          }
        }
        if (detectedDate) setImportDate(detectedDate);

        // 解析每一列資料
        const dataRows = [];
        for (let i = headerIdx+1; i < raw.length; i++) {
          const row = raw[i];
          const content = String(row[colContent] || "").trim();
          if (!content) continue;

          const startTime = excelNumToTime(row[colStart]);
          const endTime   = excelNumToTime(row[colEnd]);
          if (!startTime || !endTime) continue;

          const timeStr = `${startTime} - ${endTime}`;

          dataRows.push({
            id: i,
            time: timeStr,
            content,
            unit: colUnit !== -1 ? String(row[colUnit] || "").trim() : "",
            note: colNote !== -1 ? String(row[colNote] || "").trim() : "",
          });
        }

        if (dataRows.length === 0) {
          setError("未讀取到任何有效資料，請確認內容是否正確填寫。");
          return;
        }
        setPreview({ rows:dataRows, detectedDate });
      } catch (err) {
        setError("讀取失敗：" + err.message);
      }
    };
    reader.readAsBinaryString(file);
  }

  function handleConfirm() {
    if (!preview) return;
    const newRows = preview.rows.map((r, idx) => ({ ...r, id:idx+1 }));
    onImport(importDate, newRows, mode);
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:999 }}
      onClick={(e) => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#fff", borderRadius:"22px 22px 0 0", padding:"20px 20px 36px", width:"100%", maxWidth:520, maxHeight:"92vh", overflowY:"auto" }}>
        <div style={{ width:36, height:4, background:"#e0e0e0", borderRadius:2, margin:"0 auto 18px", cursor:"pointer" }} onClick={onClose}/>
        <div style={{ fontSize:16, fontWeight:700, color:room.color, marginBottom:4 }}>📥 Excel 匯入排程</div>
        <div style={{ fontSize:12, color:"#888", marginBottom:16 }}>{room.icon} {room.name}</div>

        {/* 欄位格式說明 */}
        <div style={{ background:"#f8f9fa", borderRadius:12, padding:"14px", marginBottom:16, border:"1px solid #e8e8e8" }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:10 }}>📋 Excel 欄位格式（第一列為標題）</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6 }}>
            {["序號","借用日","開始時","結束時","主辦單位","活動內容說明"].map((col, i) => (
              <div key={i} style={{
                background:"#fff", borderRadius:8, padding:"7px 6px",
                textAlign:"center", border:`2px solid ${room.color}55`,
                fontSize:11, color:room.color, fontWeight:700,
                gridColumn: col==="活動內容說明" ? "1 / -1" : "auto"
              }}>{col}</div>
            ))}
          </div>
          <div style={{ fontSize:11, color:"#aaa", marginTop:10, lineHeight:1.7 }}>
            ✅ <strong>開始時</strong> / <strong>結束時</strong>：會自動合併為「09:30 - 11:30」格式<br/>
            ✅ <strong>借用日</strong>：有此欄會自動辨識日期<br/>
            ✅ 可加「備註」欄（選填）
          </div>
        </div>

        {/* 選擇檔案 */}
        <div onClick={() => fileRef.current && fileRef.current.click()} style={{
          border:`2px dashed ${room.color}88`, borderRadius:14, padding:"24px 16px",
          textAlign:"center", cursor:"pointer", marginBottom:16, background:room.light
        }}>
          <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
          <div style={{ fontSize:14, fontWeight:600, color:room.color }}>點此選擇 Excel 檔案</div>
          <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>支援 .xlsx / .xls 格式</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }}/>
        </div>

        {error && (
          <div style={{ background:"#ffebee", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#c62828", lineHeight:1.6 }}>⚠ {error}</div>
        )}

        {preview && (
          <>
            <div style={{ background:"#e8f5e9", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#2e7d32" }}>
              ✅ 成功讀取 <strong>{preview.rows.length}</strong> 筆資料
              {preview.detectedDate && <span>，偵測到借用日：<strong>{formatDate(preview.detectedDate)}</strong></span>}
            </div>

            {/* 匯入日期 */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:6 }}>匯入至日期（可修改）</label>
              <input type="date" value={importDate} onChange={(e) => setImportDate(e.target.value)}
                style={{ padding:"10px 14px", border:"2px solid #e8e8e8", borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit", width:"100%", boxSizing:"border-box" }}/>
            </div>

            {/* 匯入方式 */}
            <div style={{ marginBottom:16 }}>
              <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:8 }}>匯入方式</label>
              <div style={{ display:"flex", gap:10 }}>
                {[["replace","取代當日排程"],["append","附加到現有排程"]].map(([v, label]) => (
                  <div key={v} onClick={() => setMode(v)} style={{
                    flex:1, padding:"10px 8px", borderRadius:10, cursor:"pointer", textAlign:"center",
                    border:`2px solid ${mode===v ? room.color : "#e0e0e0"}`,
                    background: mode===v ? room.light : "#fff",
                    color: mode===v ? room.color : "#888",
                    fontSize:12, fontWeight: mode===v ? 700 : 400
                  }}>
                    {mode===v ? "✓ " : ""}{label}
                  </div>
                ))}
              </div>
            </div>

            {/* 預覽表格 */}
            <div style={{ fontSize:12, color:"#666", fontWeight:600, marginBottom:8 }}>預覽內容</div>
            <div style={{ border:"1px solid #e8e8e8", borderRadius:12, overflow:"hidden", marginBottom:18 }}>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ background:room.color, color:"#fff" }}>
                      {["#","時間","活動內容說明","主辦單位"].map(h => (
                        <th key={h} style={{ padding:"8px 10px", textAlign:"left", fontWeight:600, whiteSpace:"nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {preview.rows.map((row, idx) => (
                      <tr key={idx} style={{ borderTop:"1px solid #f0f0f0", background:idx%2===0?"#fff":"#fafafa" }}>
                        <td style={{ padding:"7px 10px", color:"#aaa" }}>{idx+1}</td>
                        <td style={{ padding:"7px 10px", whiteSpace:"nowrap" }}>{row.time}</td>
                        <td style={{ padding:"7px 10px" }}>{row.content}</td>
                        <td style={{ padding:"7px 10px", color:"#888", whiteSpace:"nowrap" }}>{row.unit}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div style={{ display:"flex", gap:10 }}>
              <button onClick={onClose} style={{ flex:1, padding:13, background:"#f5f5f5", border:"none", borderRadius:12, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>取消</button>
              <button onClick={handleConfirm} style={{ flex:2, padding:13, background:room.color, color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                確認匯入 {preview.rows.length} 筆
              </button>
            </div>
          </>
        )}

        {!preview && !error && (
          <div onClick={onClose} style={{ textAlign:"center", fontSize:13, color:"#aaa", cursor:"pointer" }}>取消</div>
        )}
      </div>
    </div>
  );
}

    <div style={{ marginBottom:14 }}>
      <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:5 }}>
        {label}{required && <span style={{ color:"#e53935" }}> *</span>}

      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}

// ══ 鑰匙借用 Modal ══════════════════════════════════════════════════
function KeyBorrowModal({ room, onClose, onSuccess }) {
  const [keyData, setKeyData] = React.useState(null);
  const [form, setForm] = React.useState({ name:"", unit:"", ext:"", isTemp:false, notes:"" });
  const [loading, setLoading] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);

  React.useEffect(() => { loadKeyData(room.id).then(setKeyData); }, [room.id]);

  const quantity = keyData ? (keyData.quantity || 1) : 1;
  const active = keyData ? getActiveCount(keyData) : 0;
  const available = Math.max(0, quantity - active);

  async function handleSubmit() {
    if (!form.name.trim() || !form.unit.trim() || !form.ext.trim()) {
      alert("姓名、單位、分機號碼為必填！"); return;
    }
    if (available <= 0) { alert("目前無可用鑰匙！"); return; }
    setLoading(true);
    await addKeyRecord(room.id, {
      borrower: form.name.trim(), unit: form.unit.trim(), ext: form.ext.trim(),
      isTemp: form.isTemp, notes: form.notes.trim(),
      borrowTime: new Date().toLocaleString("zh-TW"), status:"借用中"
    });
    setLoading(false);
    setSubmitted(true);
    if (onSuccess) onSuccess();
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:999 }}
      onClick={e=>e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#fff", borderRadius:"22px 22px 0 0", padding:"20px 20px 36px", width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto" }}>
        <div style={{ width:36, height:4, background:"#e0e0e0", borderRadius:2, margin:"0 auto 16px", cursor:"pointer" }} onClick={onClose}/>
        {submitted ? (
          <div style={{ textAlign:"center", padding:"40px 0" }}>
            <div style={{ fontSize:52, marginBottom:12 }}>✅</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#2e7d32", marginBottom:8 }}>借用申請完成！</div>
            <div style={{ fontSize:13, color:"#888", marginBottom:20 }}>請至總務室領取鑰匙</div>
            <button onClick={onClose} style={{ padding:"10px 28px", background:room.color, color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>關閉</button>
          </div>
        ) : (
          <>
            <div style={{ fontSize:16, fontWeight:700, color:room.color, marginBottom:4 }}>🔑 借用鑰匙</div>
            <div style={{ fontSize:13, color:"#888", marginBottom:16 }}>{room.icon} {room.name}</div>
            <div style={{ background: available>0?"#e8f5e9":"#ffebee", borderRadius:12, padding:"12px 16px", marginBottom:18, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:11, color:"#888", marginBottom:2 }}>目前可借鑰匙</div>
                <div style={{ fontSize:24, fontWeight:800, color: available>0?"#2e7d32":"#c62828" }}>{keyData===null?"...":available} / {quantity} 把</div>
              </div>
              <div style={{ fontSize:36 }}>{available>0?"🔑":"🔒"}</div>
            </div>
            {available <= 0 ? (
              <div style={{ textAlign:"center", padding:"16px 0", color:"#c62828", fontSize:14, lineHeight:1.8 }}>
                目前所有鑰匙皆已借出<br/>
                <span style={{ fontSize:12, color:"#aaa" }}>請稍後再試或聯繫總務室</span>
              </div>
            ) : (
              <>
                <KeyInputField label="姓名" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} placeholder="請輸入姓名" required accentColor={room.color}/>
                <KeyInputField label="單位" value={form.unit} onChange={v=>setForm(p=>({...p,unit:v}))} placeholder="請輸入單位名稱" required accentColor={room.color}/>
                <KeyInputField label="分機號碼" value={form.ext} onChange={v=>setForm(p=>({...p,ext:v}))} placeholder="請輸入分機號碼" required accentColor={room.color}/>
                <div style={{ marginBottom:14 }}>
                  <div onClick={()=>setForm(p=>({...p,isTemp:!p.isTemp}))} style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", userSelect:"none" }}>
                    <div style={{ width:22, height:22, borderRadius:6, border:`2px solid ${form.isTemp?room.color:"#ddd"}`, background:form.isTemp?room.color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      {form.isTemp && <span style={{ color:"#fff", fontSize:14, lineHeight:1 }}>✓</span>}
                    </div>
                    <span style={{ fontSize:14, color:"#555" }}>臨時借用（非當日排程活動）</span>
                  </div>
                </div>
                {form.isTemp && (
                  <div style={{ marginBottom:14 }}>
                    <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:5 }}>備註（用途 / 預計歸還時間）</label>
                    <textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="例：下午場佈置，預計 17:00 歸還" rows={2}
                      style={{ width:"100%", padding:"10px 14px", border:"2px solid #e8e8e8", borderRadius:10, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:"inherit", resize:"vertical" }}/>
                  </div>
                )}
                <div style={{ display:"flex", gap:10, marginTop:8 }}>
                  <button onClick={onClose} style={{ flex:1, padding:13, background:"#f5f5f5", border:"none", borderRadius:12, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>取消</button>
                  <button onClick={handleSubmit} disabled={loading} style={{ flex:2, padding:13, background:room.color, color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit", opacity:loading?0.7:1 }}>
                    {loading ? "處理中..." : "確認借用"}
                  </button>
                </div>
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ══ 鑰匙管理儀表板（後台用）══════════════════════════════════════════
function KeyManagement() {
  const [allKeys, setAllKeys] = React.useState({});
  const [filter, setFilter] = React.useState("all");
  const [editQty, setEditQty] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => { loadAllKeysData().then(d=>{ setAllKeys(d); setLoading(false); }); }, []);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null), 3000); }

  async function handleSetQty(roomId, val) {
    const n = parseInt(val);
    if (isNaN(n) || n < 1) { alert("請輸入有效數量（最少 1 把）"); return; }
    await setKeyQuantity(roomId, n);
    setAllKeys(prev => ({ ...prev, [roomId]: { ...prev[roomId], quantity:n } }));
    setEditQty(prev => { const x={...prev}; delete x[roomId]; return x; });
    showToast("✅ 已更新鑰匙數量");
  }

  async function handleReturn(roomId, recordId, borrower) {
    if (!confirm(`確認【${borrower}】已歸還鑰匙？`)) return;
    await returnKey(roomId, recordId);
    setAllKeys(prev => ({
      ...prev,
      [roomId]: { ...prev[roomId], records: { ...prev[roomId]?.records, [recordId]: { ...prev[roomId]?.records?.[recordId], status:"已歸還", returnTime: new Date().toLocaleString("zh-TW") } } }
    }));
    showToast("✅ 鑰匙已標記歸還");
  }

  let activeBorrows = [];
  for (const room of ROOMS) {
    const kd = allKeys[room.id];
    if (!kd || !kd.records) continue;
    for (const [rid, rec] of Object.entries(kd.records)) {
      if (rec.status === "借用中") activeBorrows.push({ ...rec, roomId:room.id, roomName:room.name, roomColor:room.color, roomIcon:room.icon, recordId:rid });
    }
  }
  activeBorrows.sort((a,b) => Number(b.id||0) - Number(a.id||0));
  const filtered = filter==="all" ? activeBorrows : activeBorrows.filter(b=>b.roomId===filter);

  if (loading) return <div style={{ padding:60, textAlign:"center", color:"#bbb" }}>載入中...</div>;

  return (
    <div style={{ padding:"16px 16px 40px" }}>
      {toast && <div style={{ position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", background:"#2e7d32", color:"#fff", padding:"10px 20px", borderRadius:12, fontSize:13, fontWeight:600, zIndex:9999, whiteSpace:"nowrap", boxShadow:"0 4px 20px rgba(0,0,0,0.25)" }}>{toast}</div>}

      <div style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:1, marginBottom:10 }}>各會議室鑰匙庫存</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:22 }}>
        {ROOMS.map(room => {
          const kd = allKeys[room.id] || { quantity:1, records:{} };
          const active = getActiveCount(kd);
          const avail = Math.max(0, kd.quantity - active);
          const isEditing = editQty[room.id] !== undefined;
          return (
            <div key={room.id} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", borderLeft:`4px solid ${room.color}`, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
              <div style={{ fontSize:11, color:room.color, fontWeight:700, marginBottom:6 }}>{room.icon} {room.name}</div>
              <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:6 }}>
                <span style={{ fontSize:22, fontWeight:800, color: avail>0?"#2e7d32":"#c62828" }}>{avail}</span>
                <span style={{ fontSize:12, color:"#aaa" }}>/ {kd.quantity} 把可借</span>
              </div>
              {isEditing ? (
                <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                  <input type="number" min="1" value={editQty[room.id]}
                    onChange={e=>setEditQty(p=>({...p,[room.id]:e.target.value}))}
                    style={{ width:55, padding:"4px 8px", border:`2px solid ${room.color}`, borderRadius:8, fontSize:13, outline:"none", fontFamily:"inherit" }}/>
                  <button onClick={()=>handleSetQty(room.id, editQty[room.id])} style={{ padding:"4px 10px", background:room.color, color:"#fff", border:"none", borderRadius:8, fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>確定</button>
                  <button onClick={()=>setEditQty(p=>{const x={...p};delete x[room.id];return x;})} style={{ padding:"4px 8px", background:"#f0f0f0", color:"#555", border:"none", borderRadius:8, fontSize:12, cursor:"pointer" }}>✕</button>
                </div>
              ) : (
                <button onClick={()=>setEditQty(p=>({...p,[room.id]:String(kd.quantity)}))} style={{ fontSize:11, color:"#888", background:"#f5f5f5", border:"none", borderRadius:8, padding:"4px 10px", cursor:"pointer", fontFamily:"inherit" }}>
                  ✎ 設定數量
                </button>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:1, marginBottom:8 }}>
        借用中 ({activeBorrows.length} 筆) — 點「歸還」完成核對
      </div>
      <div style={{ overflowX:"auto", marginBottom:14 }}>
        <div style={{ display:"flex", gap:8, width:"max-content" }}>
          {[{id:"all",name:"全部",icon:"📋",color:"#555"},...ROOMS].map(r=>(
            <div key={r.id} onClick={()=>setFilter(r.id)} style={{ padding:"6px 14px", borderRadius:20, fontSize:12, cursor:"pointer", fontWeight:600, background:filter===r.id?(r.color||"#555"):"#f0f0f0", color:filter===r.id?"#fff":"#666", whiteSpace:"nowrap" }}>
              {r.icon||""} {r.name}
            </div>
          ))}
        </div>
      </div>

      {filtered.length === 0 ? (
        <div style={{ background:"#fff", borderRadius:16, padding:"40px 20px", textAlign:"center", color:"#bbb" }}>
          <div style={{ fontSize:40, marginBottom:8 }}>🔑</div>
          <div>目前無借用中的鑰匙</div>
        </div>
      ) : filtered.map(b=>(
        <div key={b.recordId} style={{ background:"#fff", borderRadius:14, padding:"14px 16px", marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", borderLeft:`4px solid ${b.roomColor}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11, color:b.roomColor, fontWeight:700, marginBottom:4 }}>{b.roomIcon} {b.roomName}</div>
              <div style={{ fontSize:15, fontWeight:700, color:"#333" }}>{b.borrower}</div>
              <div style={{ fontSize:12, color:"#888", marginTop:2 }}>🏢 {b.unit}　📞 {b.ext}</div>
              <div style={{ fontSize:11, color:"#bbb", marginTop:2 }}>⏰ {b.borrowTime}</div>
              {b.isTemp && <div style={{ fontSize:11, color:"#f57c00", marginTop:3, background:"#fff8e1", padding:"3px 8px", borderRadius:6, display:"inline-block" }}>
                🕐 臨時借用{b.notes ? `：${b.notes}` : ""}
              </div>}
            </div>
            <button onClick={()=>handleReturn(b.roomId, b.recordId, b.borrower)}
              style={{ background:"#e8f5e9", border:"1px solid #a5d6a7", color:"#2e7d32", padding:"8px 14px", borderRadius:10, cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit", flexShrink:0, marginLeft:12 }}>
              ✅ 歸還
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}


// ══ 巡檢輸入欄位（獨立，避免焦點問題）══════════════════════════════
function InspField({ label, value, onChange, placeholder, type="text", accentColor="#1e5799" }) {
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:5 }}>
        {label} <span style={{ color:"#e53935" }}>*</span>
      </label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", padding:"10px 14px", border:"2px solid #e8e8e8", borderRadius:10, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}
        onFocus={e=>e.target.style.borderColor=accentColor}
        onBlur={e=>e.target.style.borderColor="#e8e8e8"}
      />
    </div>
  );
}

// ── 三選一按鈕元件 ──
function TriBtn({ value, onChange, options, color }) {
  return (
    <div style={{ display:"flex", gap:8 }}>
      {options.map(([v, label, bg, tc]) => (
        <div key={v} onClick={()=>onChange(v)} style={{
          flex:1, textAlign:"center", padding:"10px 4px", borderRadius:12, cursor:"pointer",
          background: value===v ? bg : "#f5f5f5",
          color: value===v ? tc : "#aaa",
          border: `2px solid ${value===v ? bg : "#eee"}`,
          fontSize:13, fontWeight:700, userSelect:"none",
          boxShadow: value===v ? `0 2px 8px ${bg}55` : "none"
        }}>{label}</div>
      ))}
    </div>
  );
}

// ══ 巡檢表單 ════════════════════════════════════════════════════════
function InspectionForm({ room, onSubmitted }) {
  const emptyForm = { inspector:"", inUse:"no", usingUnit:"", micCount:"", equipOk:"", equipOff:"", batteryOk:"", lastUnit:"" };
  const [form, setForm] = React.useState(emptyForm);
  const [loading, setLoading] = React.useState(false);
  const [done, setDone] = React.useState(false);

  function set(k, v) { setForm(prev => ({...prev, [k]:v})); }

  async function handleSubmit() {
    if (!form.inspector.trim()) { alert("請填寫巡檢人員姓名！"); return; }
    if (form.inUse==="yes" && !form.usingUnit.trim()) { alert("請填寫正在使用的單位！"); return; }
    if (!form.micCount.toString().trim()) { alert("請填寫麥克風消毒數量！"); return; }
    if (!form.equipOk) { alert("請選擇設備是否運作正常！"); return; }
    if (!form.equipOff) { alert("請選擇設備電源是否已關閉！"); return; }
    if (!form.batteryOk) { alert("請選擇電池是否已補充！"); return; }
    if (!form.lastUnit.trim()) { alert("請填寫最後使用單位！"); return; }
    setLoading(true);
    const now = new Date();
    await addInspection(room.id, {
      inspector: form.inspector.trim(),
      roomId: room.id, roomName: room.name,
      inUse: form.inUse,
      usingUnit: form.inUse==="yes" ? form.usingUnit.trim() : "",
      micCount: parseInt(form.micCount) || 0,
      equipOk: form.equipOk,
      equipOff: form.equipOff,
      batteryOk: form.batteryOk,
      lastUnit: form.lastUnit.trim(),
      time: now.toLocaleString("zh-TW"),
      timeStamp: now.getTime(),
      date: now.toISOString().slice(0,10)
    });
    setLoading(false);
    setDone(true);
    setTimeout(() => { setDone(false); setForm(emptyForm); if(onSubmitted) onSubmitted(); }, 2500);
  }

  if (done) return (
    <div style={{ textAlign:"center", padding:"48px 20px" }}>
      <div style={{ fontSize:52, marginBottom:12 }}>✅</div>
      <div style={{ fontSize:18, fontWeight:700, color:"#2e7d32" }}>巡檢記錄已送出！</div>
    </div>
  );

  return (
    <div style={{ padding:"16px" }}>
      <div style={{ background:"#fff", borderRadius:16, padding:"18px 16px", marginBottom:14, boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
        <div style={{ fontSize:13, fontWeight:700, color:room.color, marginBottom:14 }}>👤 基本資訊</div>
        <InspField label="巡檢人員姓名" value={form.inspector} onChange={v=>set("inspector",v)} placeholder="請輸入姓名" accentColor={room.color}/>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:8 }}>是否有單位正在使用會議室 <span style={{ color:"#e53935" }}>*</span></div>
          <TriBtn value={form.inUse} onChange={v=>set("inUse",v)} options={[["yes","✅ 是","#e8f5e9","#2e7d32"],["no","🚫 否","#f5f5f5","#555"]]}/>
        </div>
        {form.inUse==="yes" && (
          <InspField label="正在使用單位" value={form.usingUnit} onChange={v=>set("usingUnit",v)} placeholder="請輸入使用單位名稱" accentColor={room.color}/>
        )}
      </div>

      <div style={{ background:"#fff", borderRadius:16, padding:"18px 16px", marginBottom:14, boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
        <div style={{ fontSize:13, fontWeight:700, color:room.color, marginBottom:14 }}>🎤 設備檢查</div>
        <InspField label="麥克風消毒數量（支）" value={form.micCount} onChange={v=>set("micCount",v)} placeholder="例：3" type="number" accentColor={room.color}/>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:8 }}>設備是否運作正常 <span style={{ color:"#e53935" }}>*</span></div>
          <TriBtn value={form.equipOk} onChange={v=>set("equipOk",v)} options={[["ok","✅ 正常","#e8f5e9","#2e7d32"],["fail","❌ 異常","#ffebee","#c62828"]]}/>
        </div>
        {form.equipOk==="fail" && (
          <div style={{ background:"#ffebee", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#c62828" }}>
            ⚠️ 設備異常請記錄於備用紙本，並通知相關單位處理。
          </div>
        )}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:8 }}>設備電源是否已關閉 <span style={{ color:"#e53935" }}>*</span></div>
          <TriBtn value={form.equipOff} onChange={v=>set("equipOff",v)} options={[["yes","✅ 已關閉","#e8f5e9","#2e7d32"],["no","❌ 未關閉","#ffebee","#c62828"]]}/>
        </div>
        <div style={{ marginBottom:6 }}>
          <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:8 }}>電池是否已補充 <span style={{ color:"#e53935" }}>*</span></div>
          <TriBtn value={form.batteryOk} onChange={v=>set("batteryOk",v)} options={[["yes","✅ 已補充","#e8f5e9","#2e7d32"],["no","❌ 未補充","#ffebee","#c62828"],["na","➖ 不需要","#f5f5f5","#888"]]}/>
        </div>
      </div>

      <div style={{ background:"#fff", borderRadius:16, padding:"18px 16px", marginBottom:14, boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
        <div style={{ fontSize:13, fontWeight:700, color:room.color, marginBottom:14 }}>🏢 使用紀錄</div>
        <InspField label="最後使用單位" value={form.lastUnit} onChange={v=>set("lastUnit",v)} placeholder="請輸入最後使用的單位名稱" accentColor={room.color}/>
      </div>

      <button onClick={handleSubmit} disabled={loading} style={{ width:"100%", padding:15, background:room.color, color:"#fff", border:"none", borderRadius:14, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit", boxShadow:`0 4px 16px ${room.color}44`, opacity:loading?0.7:1 }}>
        {loading ? "送出中..." : "📋 送出巡檢記錄"}
      </button>
    </div>
  );
}

// ══ 巡檢儀表板 ═══════════════════════════════════════════════════════
function InspectionDashboard({ refreshKey }) {
  const [allData, setAllData] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [filter, setFilter] = React.useState("all");

  React.useEffect(() => {
    setLoading(true);
    loadAllInspections().then(d=>{ setAllData(d); setLoading(false); });
  }, [refreshKey]);

  const today = new Date().toISOString().slice(0,10);

  // 計算每個會議室今日最後一筆巡檢
  function getRoomLastInsp(roomId) {
    const recs = allData[roomId];
    if (!recs) return null;
    const arr = Object.values(recs).filter(r=>r.date===today);
    if (!arr.length) return null;
    return arr.sort((a,b)=>b.timeStamp-a.timeStamp)[0];
  }

  // 收集所有記錄
  let allRecords = [];
  for (const room of ROOMS) {
    const recs = allData[room.id];
    if (!recs) continue;
    Object.values(recs).forEach(r => allRecords.push({...r, roomColor:room.color, roomIcon:room.icon}));
  }
  allRecords.sort((a,b)=>b.timeStamp-a.timeStamp);
  const todayRecs = allRecords.filter(r=>r.date===today);
  const issueRecs = todayRecs.filter(r=>r.equipOk==="fail"||r.equipOff==="no"||r.batteryOk==="no");
  const filteredRecs = filter==="all" ? allRecords.slice(0,50) : allRecords.filter(r=>r.roomId===filter).slice(0,30);

  const statusIcon = { ok:"✅", fail:"❌", yes:"✅", no:"❌", na:"➖" };

  if (loading) return <div style={{ padding:60, textAlign:"center", color:"#bbb" }}>載入中...</div>;

  return (
    <div style={{ padding:"16px 16px 40px" }}>
      {/* 今日統計 */}
      <div style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:1, marginBottom:10 }}>今日巡檢概況</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 }}>
        {[
          ["📋", todayRecs.length, "今日巡檢次數", "#1e5799"],
          ["✅", ROOMS.filter(r=>getRoomLastInsp(r.id)).length, "已巡檢場室", "#2e7d32"],
          ["⚠️", issueRecs.length, "發現異常", issueRecs.length>0?"#c62828":"#aaa"],
        ].map(([icon,val,label,color])=>(
          <div key={label} style={{ background:"#fff", borderRadius:14, padding:"14px 10px", textAlign:"center", boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize:22 }}>{icon}</div>
            <div style={{ fontSize:24, fontWeight:800, color, lineHeight:1.2 }}>{val}</div>
            <div style={{ fontSize:10, color:"#aaa", marginTop:2 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* 各室今日狀況 */}
      <div style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:1, marginBottom:10 }}>各會議室今日狀態</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:20 }}>
        {ROOMS.map(room => {
          const last = getRoomLastInsp(room.id);
          const hasIssue = last && (last.equipOk==="fail"||last.equipOff==="no"||last.batteryOk==="no");
          return (
            <div key={room.id} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", borderLeft:`4px solid ${hasIssue?"#c62828":last?room.color:"#ddd"}`, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
              <div style={{ fontSize:11, color:room.color, fontWeight:700, marginBottom:4 }}>{room.icon} {room.name}</div>
              {last ? (
                <>
                  <div style={{ fontSize:10, color:"#aaa" }}>最後巡檢 {last.time?.slice(11,16) || ""}</div>
                  <div style={{ fontSize:11, color:"#666", marginTop:4 }}>👤 {last.inspector}</div>
                  <div style={{ display:"flex", gap:6, marginTop:6, flexWrap:"wrap" }}>
                    <span style={{ fontSize:10, background: last.equipOk==="ok"?"#e8f5e9":"#ffebee", color: last.equipOk==="ok"?"#2e7d32":"#c62828", padding:"2px 7px", borderRadius:10, fontWeight:600 }}>
                      設備{last.equipOk==="ok"?"正常":"異常"}
                    </span>
                    <span style={{ fontSize:10, background: last.equipOff==="yes"?"#e8f5e9":"#ffebee", color: last.equipOff==="yes"?"#2e7d32":"#c62828", padding:"2px 7px", borderRadius:10, fontWeight:600 }}>
                      電源{last.equipOff==="yes"?"已關":"未關"}
                    </span>
                    <span style={{ fontSize:10, background: last.batteryOk!=="no"?"#e8f5e9":"#ffebee", color: last.batteryOk!=="no"?"#2e7d32":"#c62828", padding:"2px 7px", borderRadius:10, fontWeight:600 }}>
                      電池{last.batteryOk==="yes"?"已補":last.batteryOk==="na"?"不需要":"未補"}
                    </span>
                  </div>
                </>
              ) : (
                <div style={{ fontSize:11, color:"#ccc", marginTop:4 }}>今日尚未巡檢</div>
              )}
            </div>
          );
        })}
      </div>

      {/* 歷史記錄 */}
      <div style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:1, marginBottom:8 }}>巡檢歷史記錄</div>
      <div style={{ overflowX:"auto", marginBottom:14 }}>
        <div style={{ display:"flex", gap:8, width:"max-content" }}>
          {[{id:"all",name:"全部",icon:"📋",color:"#555"},...ROOMS].map(r=>(
            <div key={r.id} onClick={()=>setFilter(r.id)} style={{ padding:"6px 14px", borderRadius:20, fontSize:12, cursor:"pointer", fontWeight:600, background:filter===r.id?(r.color||"#555"):"#f0f0f0", color:filter===r.id?"#fff":"#666", whiteSpace:"nowrap" }}>
              {r.icon||""} {r.name}
            </div>
          ))}
        </div>
      </div>
      {filteredRecs.length===0 ? (
        <div style={{ background:"#fff", borderRadius:16, padding:"40px 20px", textAlign:"center", color:"#ccc" }}>
          <div style={{ fontSize:40, marginBottom:8 }}>📋</div>
          <div>尚無巡檢記錄</div>
        </div>
      ) : filteredRecs.map(r=>(
        <div key={r.id} style={{ background:"#fff", borderRadius:14, padding:"14px 16px", marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)", borderLeft:`4px solid ${(r.equipOk==="fail"||r.equipOff==="no"||r.batteryOk==="no")?"#c62828":r.roomColor}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
            <div>
              <div style={{ fontSize:11, color:r.roomColor, fontWeight:700 }}>{r.roomIcon} {r.roomName}</div>
              <div style={{ fontSize:14, fontWeight:700, color:"#333", marginTop:2 }}>👤 {r.inspector}</div>
              <div style={{ fontSize:11, color:"#aaa" }}>⏰ {r.time}</div>
            </div>
            {(r.equipOk==="fail"||r.equipOff==="no"||r.batteryOk==="no") && (
              <span style={{ background:"#ffebee", color:"#c62828", fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:20 }}>⚠️ 有異常</span>
            )}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, fontSize:12 }}>
            <div style={{ color:"#666" }}>🏢 使用中：{r.inUse==="yes"?`是（${r.usingUnit}）`:"否"}</div>
            <div style={{ color:"#666" }}>🎤 消毒：{r.micCount} 支</div>
            <div style={{ color: r.equipOk==="ok"?"#2e7d32":"#c62828" }}>📺 設備：{r.equipOk==="ok"?"正常":"異常"}</div>
            <div style={{ color: r.equipOff==="yes"?"#2e7d32":"#c62828" }}>🔌 電源：{r.equipOff==="yes"?"已關":"未關"}</div>
            <div style={{ color: r.batteryOk!=="no"?"#2e7d32":"#c62828" }}>🔋 電池：{r.batteryOk==="yes"?"已補":r.batteryOk==="na"?"不需要":"未補"}</div>
            <div style={{ color:"#666" }}>🏢 最後單位：{r.lastUnit}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminPage({ onLogout }) {
  const [activeRoom, setActiveRoom] = React.useState(ROOMS[0].id);
  const [roomData, setRoomData] = React.useState({});
  const [selectedDate, setSelectedDate] = React.useState(todayStr());
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({ time:"", content:"", unit:"", note:"" });
  const [showQR, setShowQR] = React.useState(false);
  const [showImport, setShowImport] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [adminTab, setAdminTab] = React.useState("schedule");

  const room = getRoomById(activeRoom);

  React.useEffect(() => {
    loadRoomData(activeRoom).then(setRoomData);
    setSelectedDate(todayStr());
    setModal(null);
    setShowQR(false);
    setShowImport(false);
  }, [activeRoom]);

  const rows = roomData[selectedDate] || [];

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 3000); }
  async function persist(nd) { setRoomData(nd); await saveRoomData(activeRoom, nd); }
  function openNew() { setForm({ time:"", content:"", unit:"", note:"" }); setModal({ mode:"new" }); }
  function openEdit(row) { setForm({ time:row.time, content:row.content, unit:row.unit||"", note:row.note||"" }); setModal({ mode:"edit", row }); }

  async function handleSave() {
    if (!form.time.trim() || !form.content.trim()) { alert("時間與內容為必填！"); return; }
    const nd = { ...roomData };
    if (!nd[selectedDate]) nd[selectedDate] = [];
    if (modal.mode === "new") {
      const maxId = nd[selectedDate].length ? Math.max(...nd[selectedDate].map(r=>r.id)) : 0;
      nd[selectedDate] = [...nd[selectedDate], { id:maxId+1, ...form }];
    } else {
      nd[selectedDate] = nd[selectedDate].map((r) => r.id===modal.row.id ? { ...r, ...form } : r);
    }
    await persist(nd);
    setModal(null);
    showToast("✅ 儲存成功");
  }

  async function handleDelete(id) {
    if (!confirm("確定刪除？")) return;
    const nd = { ...roomData };
    nd[selectedDate] = (nd[selectedDate]||[]).filter(r=>r.id!==id);
    await persist(nd);
    showToast("已刪除");
  }

  async function move(idx, dir) {
    const arr = [...(roomData[selectedDate]||[])];
    const t = idx+dir;
    if (t<0||t>=arr.length) return;
    [arr[idx],arr[t]]=[arr[t],arr[idx]];
    await persist({ ...roomData, [selectedDate]:arr });
  }

  async function handleImport(date, newRows, importMode) {
    const nd = { ...roomData };
    if (importMode === "append") {
      const existing = nd[date] || [];
      const maxId = existing.length ? Math.max(...existing.map(r=>r.id)) : 0;
      nd[date] = [...existing, ...newRows.map((r,i) => ({ ...r, id:maxId+i+1 }))];
    } else {
      nd[date] = newRows;
    }
    await persist(nd);
    setSelectedDate(date);
    setShowImport(false);
    showToast(`✅ 成功匯入 ${newRows.length} 筆到 ${formatDate(date)}`);
  }

  return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      {toast && (
        <div style={{ position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", background:"#2e7d32", color:"#fff", padding:"10px 20px", borderRadius:12, fontSize:13, fontWeight:600, zIndex:9999, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", whiteSpace:"nowrap" }}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#1a3a5c,#1e5799)", color:"#fff", padding:"14px 18px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:10, opacity:0.7 }}>後台管理 · {HOSPITAL_NAME}</div>
          <div style={{ fontSize:16, fontWeight:700 }}>會議室管理系統</div>
        </div>
        <button onClick={onLogout} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)", color:"#fff", padding:"6px 14px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>登出</button>
      </div>

      {/* 主要頁籤 */}
      <div style={{ background:"#fff", borderBottom:"1px solid #eee", display:"flex" }}>
        <div onClick={()=>setAdminTab("schedule")} style={{ flex:1, textAlign:"center", padding:"12px 8px", cursor:"pointer", fontSize:13, fontWeight:700, borderBottom: adminTab==="schedule"?"3px solid #1e5799":"3px solid transparent", color: adminTab==="schedule"?"#1e5799":"#aaa" }}>
          📅 排程管理
        </div>
        <div onClick={()=>setAdminTab("keys")} style={{ flex:1, textAlign:"center", padding:"12px 8px", cursor:"pointer", fontSize:13, fontWeight:700, borderBottom: adminTab==="keys"?"3px solid #f57c00":"3px solid transparent", color: adminTab==="keys"?"#f57c00":"#aaa" }}>
          🔑 鑰匙管理
        </div>
        <div onClick={()=>setAdminTab("cleaning")} style={{ flex:1, textAlign:"center", padding:"12px 8px", cursor:"pointer", fontSize:13, fontWeight:700, borderBottom: adminTab==="cleaning"?"3px solid #00695c":"3px solid transparent", color: adminTab==="cleaning"?"#00695c":"#aaa" }}>
          🧹 消毒紀錄
        </div>
      </div>

      {/* 鑰匙管理頁 */}
      {adminTab==="keys" && <KeyManagement/>}

      {/* 消毒紀錄頁 */}
      {adminTab==="cleaning" && <CleaningRecords/>}

      {/* 排程管理頁 */}
      {adminTab==="schedule" && (
        <div>
          {/* 會議室子頁籤 */}
          <div style={{ background:"#fff", borderBottom:"1px solid #eee", overflowX:"auto" }}>
            <div style={{ display:"flex", width:"max-content" }}>
              {ROOMS.map((r) => (
                <div key={r.id} onClick={() => setActiveRoom(r.id)} style={{ padding:"12px 16px", cursor:"pointer", fontSize:13, fontWeight:600, borderBottom: activeRoom===r.id ? `3px solid ${r.color}` : "3px solid transparent", color: activeRoom===r.id ? r.color : "#888", whiteSpace:"nowrap" }}>
                  {r.icon} {r.name}
                </div>
              ))}
            </div>
          </div>

          {/* Excel 匯入 + QR */}
          <div style={{ padding:"12px 16px 4px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
              <div style={{ fontSize:14, fontWeight:700, color:room.color }}>{room.icon} {room.name}</div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setShowImport(true)} style={{ background:"#e8f5e9", border:"1px solid #a5d6a7", color:"#2e7d32", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>
                  📥 Excel 匯入
                </button>
                <button onClick={() => setShowQR(!showQR)} style={{ background:room.light, border:`1px solid ${room.color}44`, color:room.color, padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
                  {showQR ? "收起 QR" : "🔳 QR Code"}
                </button>
              </div>
            </div>
            {showQR && (
              <div style={{ background:"#fff", borderRadius:16, padding:20, textAlign:"center", marginTop:10, boxShadow:"0 2px 12px rgba(0,0,0,0.08)" }}>
                <img src={qrUrl(activeRoom)} alt="QR Code" style={{ width:160, height:160, borderRadius:8 }}/>
                <div style={{ fontSize:12, color:"#888", marginTop:8 }}>員工掃碼可直接查看此會議室排程</div>
              </div>
            )}
          </div>

          {/* 日期選擇器 */}
          <DatePicker selected={selectedDate} onChange={(d) => { setSelectedDate(d); setModal(null); }} markedDates={roomData} accentColor={room.color}/>
          <div style={{ padding:"4px 18px 10px", fontSize:13, color:"#666", fontWeight:600 }}>📅 {formatDate(selectedDate)}</div>

          {/* 排程列表 */}
          <div style={{ padding:"0 16px 16px" }}>
            {rows.length === 0
              ? <div style={{ background:"#fff", borderRadius:16, padding:"28px 20px", textAlign:"center", color:"#bbb", marginBottom:12 }}>
                  <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
                  <div>當日無排程</div>
                  <div style={{ fontSize:12, marginTop:6, color:"#ccc" }}>可手動新增或使用 Excel 匯入</div>
                </div>
              : <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:12 }}>
                  {rows.map((row, idx) => (
                    <div key={row.id} style={{ background:"#fff", borderRadius:14, padding:"13px 14px", boxShadow:"0 2px 8px rgba(0,0,0,0.06)", borderLeft:`4px solid ${room.color}` }}>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:14, fontWeight:700, color:"#333" }}>{row.content}</div>
                          <div style={{ fontSize:12, color:room.color, marginTop:2 }}>🕐 {row.time}</div>
                          {row.unit && <div style={{ fontSize:11, color:"#888" }}>🏢 {row.unit}</div>}
                          {row.note && <div style={{ fontSize:11, color:"#bbb" }}>📝 {row.note}</div>}
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", gap:5, marginLeft:10, flexShrink:0 }}>
                          <div style={{ display:"flex", gap:4 }}>
                            <SB bg="#f0f0f0" c="#555" onClick={() => move(idx,-1)}>▲</SB>
                            <SB bg="#f0f0f0" c="#555" onClick={() => move(idx,1)}>▼</SB>
                          </div>
                          <div style={{ display:"flex", gap:4 }}>
                            <SB bg={room.light} c={room.color} onClick={() => openEdit(row)}>✏</SB>
                            <SB bg="#ffebee" c="#c62828" onClick={() => handleDelete(row.id)}>🗑</SB>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
            }
            <button onClick={openNew} style={{ width:"100%", padding:14, background:room.color, color:"#fff", border:"none", borderRadius:14, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit", letterSpacing:1, boxShadow:`0 4px 16px ${room.color}44` }}>
              ＋ 手動新增排程
            </button>
          </div>

          {/* 編輯 Modal */}
          {modal && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:999 }}
              onClick={(e) => e.target===e.currentTarget && setModal(null)}>
              <div style={{ background:"#fff", borderRadius:"22px 22px 0 0", padding:"20px 20px 36px", width:"100%", maxWidth:480, maxHeight:"85vh", overflowY:"auto" }}>
                <div style={{ width:36, height:4, background:"#e0e0e0", borderRadius:2, margin:"0 auto 18px", cursor:"pointer" }} onClick={() => setModal(null)}/>
                <div style={{ fontSize:16, fontWeight:700, color:room.color, marginBottom:18 }}>
                  {modal.mode==="new" ? "＋ 新增排程" : "✏ 編輯排程"} — {room.name}
                </div>
                <AdminField label="時間" k="time" form={form} setForm={setForm} placeholder="例：09:30 - 11:30" required accentColor={room.color}/>
                <AdminField label="活動內容說明" k="content" form={form} setForm={setForm} placeholder="例：志工教育訓練" required accentColor={room.color}/>
                <AdminField label="主辦單位" k="unit" form={form} setForm={setForm} placeholder="例：志工室" accentColor={room.color}/>
                <AdminField label="備註" k="note" form={form} setForm={setForm} placeholder="選填" accentColor={room.color}/>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setModal(null)} style={{ flex:1, padding:13, background:"#f5f5f5", border:"none", borderRadius:12, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>取消</button>
                  <button onClick={handleSave} style={{ flex:2, padding:13, background:room.color, color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>儲存</button>
                </div>
              </div>
            </div>
          )}

          {showImport && (
            <ExcelImportModal room={room} selectedDate={selectedDate} onClose={() => setShowImport(false)} onImport={handleImport}/>
          )}
        </div>
      )}
    </div>
  );
}

function CleaningForm({ onBack }) {
  const now = new Date();
  const defaultTime = now.toLocaleString("zh-TW", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false }).replace(/\//g,"-");

  const [step, setStep] = React.useState(1); // 1=基本資料, 2=occupied, 3=full form, 4=done
  const [form, setForm] = React.useState({
    time: defaultTime, name:"", roomId:"", isOccupied:"",
    occupyingUnit:"", micCount:"", equipmentOk:"", equipmentOff:"",
    batteryRefilled:"", lastUnit:""
  });
  const [submitting, setSubmitting] = React.useState(false);

  function setF(k, v) { setForm(p => ({...p, [k]:v})); }

  async function handleSubmit() {
    setSubmitting(true);
    const room = ROOMS.find(r => r.id === form.roomId);
    const record = {
      time: form.time,
      name: form.name,
      roomId: form.roomId,
      roomName: room ? room.name : form.roomId,
      isOccupied: form.isOccupied === "yes",
      occupyingUnit: form.isOccupied === "yes" ? form.occupyingUnit : "",
      micCount: form.isOccupied === "no" ? form.micCount : "",
      equipmentOk: form.isOccupied === "no" ? form.equipmentOk : "",
      equipmentOff: form.isOccupied === "no" ? form.equipmentOff : "",
      batteryRefilled: form.isOccupied === "no" ? form.batteryRefilled : "",
      lastUnit: form.isOccupied === "no" ? form.lastUnit : "",
    };
    await addCleaningRecord(record);
    setSubmitting(false);
    setStep(4);
  }

  const accentColor = "#1e5799";

  // 步驟1：基本資料
  if (step === 1) return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      <div style={{ background:"linear-gradient(135deg,#1a3a5c,#1e5799)", color:"#fff", padding:"18px 20px" }}>
        <div onClick={onBack} style={{ fontSize:12, opacity:0.75, cursor:"pointer", marginBottom:10 }}>← 返回首頁</div>
        <div style={{ fontSize:20, fontWeight:700 }}>🧹 消毒紀錄填寫</div>
        <div style={{ fontSize:12, opacity:0.75, marginTop:4 }}>{HOSPITAL_NAME}</div>
      </div>
      <div style={{ padding:"20px 16px" }}>
        <div style={{ background:"#fff", borderRadius:18, padding:"20px 18px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
          <div style={{ fontSize:13, color:"#aaa", fontWeight:700, letterSpacing:1, marginBottom:16 }}>基本資料</div>
          <CleaningInputField label="填寫時間" value={form.time} onChange={v=>setF("time",v)} placeholder="例：2026-04-22 14:30" required/>
          <CleaningInputField label="填寫人姓名" value={form.name} onChange={v=>setF("name",v)} placeholder="請輸入姓名" required/>
          <div style={{ marginBottom:16 }}>
            <label style={{ fontSize:13, color:"#444", fontWeight:600, display:"block", marginBottom:6 }}>會議室名稱 <span style={{ color:"#e53935" }}>*</span></label>
            <select value={form.roomId} onChange={e=>setF("roomId",e.target.value)}
              style={{ width:"100%", padding:"11px 14px", border:"2px solid #e8e8e8", borderRadius:10, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:"inherit", background:"#fff" }}>
              <option value="">請選擇會議室</option>
              {ROOMS.map(r => <option key={r.id} value={r.id}>{r.icon} {r.name}</option>)}
            </select>
          </div>
          <button onClick={() => {
            if (!form.time || !form.name || !form.roomId) { alert("請填寫所有必填欄位！"); return; }
            setStep(2);
          }} style={{ width:"100%", padding:14, background:accentColor, color:"#fff", border:"none", borderRadius:12, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
            下一步 →
          </button>
        </div>
      </div>
    </div>
  );

  // 步驟2：是否有單位使用中
  if (step === 2) return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      <div style={{ background:"linear-gradient(135deg,#1a3a5c,#1e5799)", color:"#fff", padding:"18px 20px" }}>
        <div onClick={()=>setStep(1)} style={{ fontSize:12, opacity:0.75, cursor:"pointer", marginBottom:10 }}>← 上一步</div>
        <div style={{ fontSize:20, fontWeight:700 }}>🧹 消毒紀錄填寫</div>
      </div>
      <div style={{ padding:"20px 16px" }}>
        <div style={{ background:"#fff", borderRadius:18, padding:"24px 18px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
          <div style={{ fontSize:15, fontWeight:700, color:"#333", marginBottom:6 }}>
            是否有單位正在使用會議室？
          </div>
          <div style={{ fontSize:13, color:"#888", marginBottom:20 }}>
            {ROOMS.find(r=>r.id===form.roomId)?.icon} {ROOMS.find(r=>r.id===form.roomId)?.name}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div onClick={() => { setF("isOccupied","yes"); setStep(3); }}
              style={{ padding:"16px 18px", border:"2px solid #e8e8e8", borderRadius:14, cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:22, height:22, borderRadius:"50%", background:"#ffebee", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>✓</div>
              <div>
                <div style={{ fontWeight:700, fontSize:14, color:"#c62828" }}>是，目前有人使用</div>
                <div style={{ fontSize:12, color:"#aaa", marginTop:2 }}>填寫使用單位後結束</div>
              </div>
            </div>
            <div onClick={() => { setF("isOccupied","no"); setStep(3); }}
              style={{ padding:"16px 18px", border:"2px solid #e8e8e8", borderRadius:14, cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:22, height:22, borderRadius:"50%", background:"#e8f5e9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>✗</div>
              <div>
                <div style={{ fontWeight:700, fontSize:14, color:"#2e7d32" }}>否，會議室空閒中</div>
                <div style={{ fontSize:12, color:"#aaa", marginTop:2 }}>繼續填寫完整消毒紀錄</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  // 步驟3a：有人使用 → 填使用單位
  if (step === 3 && form.isOccupied === "yes") return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      <div style={{ background:"linear-gradient(135deg,#c62828,#e53935)", color:"#fff", padding:"18px 20px" }}>
        <div onClick={()=>setStep(2)} style={{ fontSize:12, opacity:0.75, cursor:"pointer", marginBottom:10 }}>← 上一步</div>
        <div style={{ fontSize:20, fontWeight:700 }}>⚠️ 會議室使用中</div>
      </div>
      <div style={{ padding:"20px 16px" }}>
        <div style={{ background:"#fff", borderRadius:18, padding:"20px 18px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
          <CleaningInputField label="正在使用的單位名稱" value={form.occupyingUnit} onChange={v=>setF("occupyingUnit",v)} placeholder="請輸入單位名稱" required/>
          <button onClick={() => {
            if (!form.occupyingUnit) { alert("請填寫使用單位！"); return; }
            handleSubmit();
          }} disabled={submitting} style={{ width:"100%", padding:14, background:"#c62828", color:"#fff", border:"none", borderRadius:12, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit", opacity:submitting?0.7:1 }}>
            {submitting ? "送出中..." : "✅ 送出紀錄"}
          </button>
        </div>
      </div>
    </div>
  );

  // 步驟3b：空閒 → 完整表單
  if (step === 3 && form.isOccupied === "no") return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      <div style={{ background:"linear-gradient(135deg,#1a3a5c,#1e5799)", color:"#fff", padding:"18px 20px" }}>
        <div onClick={()=>setStep(2)} style={{ fontSize:12, opacity:0.75, cursor:"pointer", marginBottom:10 }}>← 上一步</div>
        <div style={{ fontSize:20, fontWeight:700 }}>🧹 消毒檢查項目</div>
      </div>
      <div style={{ padding:"20px 16px 40px" }}>
        <div style={{ background:"#fff", borderRadius:18, padding:"20px 18px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
          <CleaningInputField label="麥克風消毒數量" value={form.micCount} onChange={v=>setF("micCount",v)} placeholder="請輸入數量（支）" required type="number"/>

          {[
            { key:"equipmentOk",    label:"設備是否運作正常",  yes:"正常", no:"異常" },
            { key:"equipmentOff",   label:"設備有無關閉",      yes:"已關閉", no:"未關閉" },
            { key:"batteryRefilled",label:"電池有無撥補",      yes:"已撥補", no:"無需撥補" },
          ].map(({ key, label, yes, no }) => (
            <div key={key} style={{ marginBottom:16 }}>
              <label style={{ fontSize:13, color:"#444", fontWeight:600, display:"block", marginBottom:8 }}>
                {label} <span style={{ color:"#e53935" }}>*</span>
              </label>
              <div style={{ display:"flex", gap:10 }}>
                {[{v:"yes",t:yes,c:"#e8f5e9",tc:"#2e7d32"},{v:"no",t:no,c:"#ffebee",tc:"#c62828"}].map(opt => (
                  <div key={opt.v} onClick={()=>setF(key,opt.v)} style={{
                    flex:1, padding:"10px 8px", textAlign:"center", borderRadius:10, cursor:"pointer", fontSize:13, fontWeight:700,
                    border: form[key]===opt.v ? `2px solid ${opt.tc}` : "2px solid #e8e8e8",
                    background: form[key]===opt.v ? opt.c : "#fff",
                    color: form[key]===opt.v ? opt.tc : "#aaa"
                  }}>{opt.t}</div>
                ))}
              </div>
            </div>
          ))}

          <CleaningInputField label="最後使用單位" value={form.lastUnit} onChange={v=>setF("lastUnit",v)} placeholder="請輸入單位名稱" required/>

          <button onClick={() => {
            if (!form.micCount || !form.equipmentOk || !form.equipmentOff || !form.batteryRefilled || !form.lastUnit) {
              alert("請填寫所有必填欄位！"); return;
            }
            handleSubmit();
          }} disabled={submitting} style={{ width:"100%", padding:14, background:accentColor, color:"#fff", border:"none", borderRadius:12, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit", marginTop:8, opacity:submitting?0.7:1 }}>
            {submitting ? "送出中..." : "✅ 送出消毒紀錄"}
          </button>
        </div>
      </div>
    </div>
  );

  // 步驟4：完成
  return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ textAlign:"center", padding:"40px 24px" }}>
        <div style={{ fontSize:64, marginBottom:16 }}>✅</div>
        <div style={{ fontSize:20, fontWeight:700, color:"#2e7d32", marginBottom:8 }}>紀錄已送出！</div>
        <div style={{ fontSize:14, color:"#888", marginBottom:28 }}>消毒紀錄已成功儲存</div>
        <button onClick={onBack} style={{ padding:"12px 32px", background:"#1e5799", color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit", marginRight:12 }}>返回首頁</button>
        <button onClick={() => { setStep(1); setForm({time:defaultTime, name:"", roomId:"", isOccupied:"", occupyingUnit:"", micCount:"", equipmentOk:"", equipmentOff:"", batteryRefilled:"", lastUnit:""}); }} style={{ padding:"12px 32px", background:"#e8f5e9", color:"#2e7d32", border:"2px solid #a5d6a7", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>再填一筆</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// 消毒紀錄查看（後台）
// ══════════════════════════════════════════════════════
function CleaningRecords() {
  const [records, setRecords] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [filterRoom, setFilterRoom] = React.useState("all");

  React.useEffect(() => {
    loadCleaningRecords().then(r => { setRecords(r); setLoading(false); });
  }, []);

  const filtered = filterRoom === "all" ? records : records.filter(r => r.roomId === filterRoom);

  if (loading) return <div style={{ padding:60, textAlign:"center", color:"#bbb" }}>載入中...</div>;

  return (
    <div style={{ padding:"16px 16px 40px" }}>
      <div style={{ overflowX:"auto", marginBottom:14 }}>
        <div style={{ display:"flex", gap:8, width:"max-content" }}>
          {[{id:"all",name:"全部",icon:"📋",color:"#555"},...ROOMS].map(r => (
            <div key={r.id} onClick={()=>setFilterRoom(r.id)} style={{ padding:"6px 14px", borderRadius:20, fontSize:12, cursor:"pointer", fontWeight:600, background:filterRoom===r.id?(r.color||"#555"):"#f0f0f0", color:filterRoom===r.id?"#fff":"#666", whiteSpace:"nowrap" }}>
              {r.icon||""} {r.name}
            </div>
          ))}
        </div>
      </div>

      {filtered.length === 0 ? (
        <div style={{ background:"#fff", borderRadius:16, padding:"40px 20px", textAlign:"center", color:"#ccc" }}>
          <div style={{ fontSize:40, marginBottom:8 }}>🧹</div>
          <div>尚無消毒紀錄</div>
        </div>
      ) : filtered.map(r => {
        const room = ROOMS.find(rm=>rm.id===r.roomId);
        return (
          <div key={r.id} style={{ background:"#fff", borderRadius:14, padding:"14px 16px", marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", borderLeft:`4px solid ${room?.color||"#ccc"}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
              <div style={{ fontSize:11, color:room?.color||"#aaa", fontWeight:700 }}>{room?.icon} {r.roomName}</div>
              <div style={{ fontSize:11, color:"#bbb" }}>{r.time}</div>
            </div>
            <div style={{ fontSize:14, fontWeight:700, color:"#333", marginBottom:4 }}>👤 {r.name}</div>
            {r.isOccupied ? (
              <div style={{ fontSize:12, color:"#c62828", background:"#ffebee", borderRadius:8, padding:"6px 10px", display:"inline-block" }}>
                ⚠️ 使用中 — {r.occupyingUnit}
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginTop:6 }}>
                <div style={{ fontSize:12, color:"#555" }}>🎤 麥克風消毒：{r.micCount} 支</div>
                <div style={{ fontSize:12, color: r.equipmentOk==="yes"?"#2e7d32":"#c62828" }}>⚙️ 設備：{r.equipmentOk==="yes"?"正常":"異常"}</div>
                <div style={{ fontSize:12, color: r.equipmentOff==="yes"?"#2e7d32":"#c62828" }}>🔌 關閉：{r.equipmentOff==="yes"?"已關閉":"未關閉"}</div>
                <div style={{ fontSize:12, color: r.batteryRefilled==="yes"?"#2e7d32":"#888" }}>🔋 電池：{r.batteryRefilled==="yes"?"已撥補":"無需撥補"}</div>
                {r.lastUnit && <div style={{ fontSize:12, color:"#888", gridColumn:"1/-1" }}>🏢 最後使用：{r.lastUnit}</div>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// App Root
// ══════════════════════════════════════════════════════
function App() {
  const [page, setPage] = React.useState("home");
  const [activeRoom, setActiveRoom] = React.useState(null);
  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet"/>
      {page==="home"     && <HomePage onRoomSelect={(id) => { setActiveRoom(id); setPage("room"); }} onAdminClick={() => setPage("login")} onCleaningClick={() => setPage("cleaning")}/>}
      {page==="room"     && <RoomPage roomId={activeRoom} onBack={() => setPage("home")}/>}
      {page==="login"    && <LoginPage onLogin={() => setPage("admin")} onBack={() => setPage("home")}/>}
      {page==="admin"    && <AdminPage onLogout={() => setPage("home")}/>}
      {page==="cleaning" && <CleaningForm onBack={() => setPage("home")}/>}
    </>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
